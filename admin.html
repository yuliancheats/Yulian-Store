<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YULIAN STORE — Acceder</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --orange: #FF6B1A;
      --orange-bright: #FF8C42;
      --dark: #080808;
      --dark2: #0e0e0e;
      --card: #111111;
      --card2: #161616;
      --text: #ffffff;
      --text-muted: #999999;
      --border: rgba(255,107,26,0.2);
      --neon: 0 0 8px #FF6B1A, 0 0 20px #FF6B1A, 0 0 40px rgba(255,107,26,0.4);
      --font-display: 'Orbitron', sans-serif;
      --font-body: 'Exo 2', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--dark); color: var(--text);
      font-family: var(--font-body); min-height: 100vh;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(255,107,26,0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 50%, rgba(255,107,26,0.07) 0%, transparent 50%), #080808;
    }
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(255,107,26,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,107,26,0.04) 1px, transparent 1px);
      background-size: 50px 50px;
    }
    .login-wrap { position: relative; z-index: 1; width: 100%; max-width: 440px; padding: 20px; }
    .logo-top {
      text-align: center; font-family: var(--font-display);
      font-size: 1.6rem; font-weight: 900; letter-spacing: 4px;
      text-shadow: var(--neon); margin-bottom: 32px;
    }
    .logo-top span { color: var(--orange); }
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 40px 36px; position: relative;
      box-shadow: 0 0 40px rgba(255,107,26,0.05);
    }
    .card::before, .card::after { content: ''; position: absolute; width: 20px; height: 20px; }
    .card::before {
      top: -1px; left: -1px;
      border-top: 2px solid var(--orange); border-left: 2px solid var(--orange);
      border-radius: 10px 0 0 0; box-shadow: -2px -2px 10px rgba(255,107,26,0.4);
    }
    .card::after {
      bottom: -1px; right: -1px;
      border-bottom: 2px solid var(--orange); border-right: 2px solid var(--orange);
      border-radius: 0 0 10px 0; box-shadow: 2px 2px 10px rgba(255,107,26,0.4);
    }
    .tabs { display: flex; margin-bottom: 32px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .tab {
      flex: 1; text-align: center; padding: 12px;
      font-family: var(--font-display); font-size: 0.65rem; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
      color: var(--text-muted); border-bottom: 2px solid transparent;
      margin-bottom: -1px; transition: all 0.25s;
    }
    .tab.active { color: var(--orange); border-bottom-color: var(--orange); text-shadow: 0 0 8px var(--orange); }
    .form { display: none; }
    .form.active { display: block; }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block; font-family: var(--font-display); font-size: 0.6rem;
      letter-spacing: 2px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase;
    }
    .form-group input {
      width: 100%; background: var(--card2); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 4px; padding: 12px 16px; color: var(--text);
      font-family: var(--font-body); font-size: 0.95rem; outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    .form-group input:focus { border-color: var(--orange); box-shadow: 0 0 10px rgba(255,107,26,0.2); }
    .form-group input::placeholder { color: rgba(255,255,255,0.2); }
    .btn-submit {
      width: 100%; background: var(--orange); color: #000; border: none;
      padding: 14px; border-radius: 4px; font-family: var(--font-display);
      font-weight: 700; font-size: 0.72rem; letter-spacing: 2.5px;
      text-transform: uppercase; cursor: pointer; margin-top: 8px; transition: all 0.25s;
    }
    .btn-submit:hover { background: var(--orange-bright); box-shadow: var(--neon); transform: translateY(-2px); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .msg { padding: 12px 16px; border-radius: 4px; font-size: 0.85rem; margin-bottom: 20px; display: none; }
    .msg.error { background: rgba(255,50,50,0.1); border: 1px solid rgba(255,50,50,0.3); color: #ff6666; display: block; }
    .msg.success { background: rgba(50,255,100,0.1); border: 1px solid rgba(50,255,100,0.3); color: #66ff88; display: block; }
    .back-link { text-align: center; margin-top: 24px; }
    .back-link a { color: var(--text-muted); font-size: 0.82rem; text-decoration: none; transition: color 0.2s; }
    .back-link a:hover { color: var(--orange); }
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(0,0,0,0.3); border-top-color: #000;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      margin-right: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  
    /* ── CURSOR PERSONALIZADO ── */
    * { cursor: none !important; }
    #cdot {
      position: fixed; top: 0; left: 0; width: 10px; height: 10px;
      background: #111; border-radius: 50%; pointer-events: none;
      z-index: 999999; transform: translate(-50%,-50%);
      box-shadow: 0 0 0 2.5px rgba(255,107,26,0.95), 0 0 14px rgba(255,107,26,0.5);
    }
    #cring {
      position: fixed; top: 0; left: 0; width: 38px; height: 38px;
      border: 2.5px solid rgba(255,107,26,0.8); border-radius: 50%;
      pointer-events: none; z-index: 999998;
      transform: translate(-50%,-50%);
      box-shadow: 0 0 14px rgba(255,107,26,0.3);
      transition: width .18s, height .18s, border-color .18s;
    }
  </style>
</head>
<body>
<div class="bg"></div>
<div class="bg-grid"></div>

<div class="login-wrap">
  <div class="logo-top"><span>YULIAN</span> STORE</div>
  <div class="card">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">Iniciar Sesión</div>
      <div class="tab" onclick="switchTab('register')">Crear Cuenta</div>
    </div>

    <!-- LOGIN -->
    <div class="form active" id="form-login">
      <div id="msg-login" class="msg"></div>
      <div class="form-group">
        <label>Correo Electrónico</label>
        <input type="email" id="login-email" placeholder="tu@correo.com">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="login-pass" placeholder="••••••••">
      </div>
      <button class="btn-submit" id="btn-login" onclick="doLogin()">Entrar</button>
    </div>

    <!-- REGISTER -->
    <div class="form" id="form-register">
      <div id="msg-register" class="msg"></div>
      <div class="form-group">
        <label>Nombre de Usuario</label>
        <input type="text" id="reg-name" placeholder="Tu nombre o alias">
      </div>
      <div class="form-group">
        <label>Correo Electrónico</label>
        <input type="email" id="reg-email" placeholder="tu@correo.com">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="reg-pass" placeholder="Mínimo 6 caracteres">
      </div>
      <button class="btn-submit" id="btn-register" onclick="doRegister()">Crear Cuenta</button>
    </div>

    <div class="back-link"><a href="index.html">← Volver a la tienda</a></div>
  </div>
</div>

<script type="module">
  import { initializeApp }                          from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword,
           createUserWithEmailAndPassword,
           updateProfile, onAuthStateChanged,
           setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, setDoc,
           addDoc, collection, serverTimestamp }    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB-HNqDxY2uRRS922yGkrtJDKuh0iwbbn0",
    authDomain: "yulian-store.firebaseapp.com",
    projectId: "yulian-store",
    storageBucket: "yulian-store.firebasestorage.app",
    messagingSenderId: "372613089099",
    appId: "1:372613089099:web:b70fae80818c73628f8ace"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);
  const ADMIN = 'admin@yulianstore.com';

  // Mantener sesión aunque cierre el navegador
  setPersistence(auth, browserLocalPersistence);

  // Flag para evitar que onAuthStateChanged redirija durante registro/login manual
  let manualFlow = false;

  // Solo redirige si ya estaba logueado antes de abrir la página
  onAuthStateChanged(auth, (user) => {
    if (user && !manualFlow) {
      redirect(user);
    }
  });

  function redirect(user) {
    window.location.href = user.email === ADMIN ? 'admin.html' : 'index.html';
  }

  // ── LOGIN ──
  window.doLogin = async function() {
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-pass').value;
    const btn   = document.getElementById('btn-login');
    const msg   = document.getElementById('msg-login');
    if (!email || !pass) { showMsg(msg,'error','Por favor completa todos los campos.'); return; }

    manualFlow = true;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Entrando...';
    msg.className = 'msg';

    try {
      const cred = await signInWithEmailAndPassword(auth, email, pass);

      // Registrar sesión
      await addDoc(collection(db, 'sesiones'), {
        uid:  cred.user.uid,
        nombre: cred.user.displayName || '—',
        email: cred.user.email,
        fecha: serverTimestamp(),
        dispositivo: /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) ? '📱 Móvil' : '💻 Escritorio',
        navegador: (() => {
          const ua = navigator.userAgent;
          if (ua.includes('Edg'))    return 'Edge';
          if (ua.includes('Chrome')) return 'Chrome';
          if (ua.includes('Firefox'))return 'Firefox';
          if (ua.includes('Safari')) return 'Safari';
          return 'Otro';
        })()
      });

      showMsg(msg, 'success', '¡Bienvenido! Redirigiendo...');
      setTimeout(() => redirect(cred.user), 1000);

    } catch(e) {
      manualFlow = false;
      btn.disabled = false;
      btn.textContent = 'Entrar';
      const errs = {
        'auth/user-not-found':    'No existe una cuenta con ese correo.',
        'auth/wrong-password':    'Contraseña incorrecta.',
        'auth/invalid-email':     'El correo no es válido.',
        'auth/too-many-requests': 'Demasiados intentos. Espera un momento.',
        'auth/invalid-credential':'Correo o contraseña incorrectos.',
      };
      showMsg(msg, 'error', errs[e.code] || 'Error al iniciar sesión.');
    }
  };

  // ── REGISTER ──
  window.doRegister = async function() {
    const name  = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const pass  = document.getElementById('reg-pass').value;
    const btn   = document.getElementById('btn-register');
    const msg   = document.getElementById('msg-register');

    if (!name || !email || !pass) { showMsg(msg,'error','Por favor completa todos los campos.'); return; }
    if (pass.length < 6)          { showMsg(msg,'error','La contraseña debe tener al menos 6 caracteres.'); return; }

    manualFlow = true;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Creando cuenta...';
    msg.className = 'msg';

    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await updateProfile(cred.user, { displayName: name });

      // Guardar en Firestore ANTES de redirigir
      await setDoc(doc(db, 'users', cred.user.uid), {
        name:      name,
        email:     email,
        role:      'user',
        createdAt: serverTimestamp(),
        purchases: [],
        saldo:     0
      });

      showMsg(msg, 'success', '✅ ¡Cuenta creada! Iniciando sesión...');
      setTimeout(() => redirect(cred.user), 1200);

    } catch(e) {
      manualFlow = false;
      btn.disabled = false;
      btn.textContent = 'Crear Cuenta';
      const errs = {
        'auth/email-already-in-use': 'Ya existe una cuenta con ese correo.',
        'auth/invalid-email':        'El correo no es válido.',
        'auth/weak-password':        'La contraseña es muy débil.',
      };
      showMsg(msg, 'error', errs[e.code] || 'Error al crear la cuenta.');
    }
  };

  function showMsg(el, type, text) { el.className = `msg ${type}`; el.textContent = text; }

  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    const loginActive = document.getElementById('form-login').classList.contains('active');
    if (loginActive) window.doLogin(); else window.doRegister();
  });
</script>

<script>
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
    if (tab === 'login') {
      document.querySelectorAll('.tab')[0].classList.add('active');
      document.getElementById('form-login').classList.add('active');
    } else {
      document.querySelectorAll('.tab')[1].classList.add('active');
      document.getElementById('form-register').classList.add('active');
    }
  }
</script>

<script>
/* ── CURSOR PERSONALIZADO ── */
(function(){
  const dot  = document.createElement('div'); dot.id = 'cdot';
  const ring = document.createElement('div'); ring.id = 'cring';
  document.body.appendChild(dot);
  document.body.appendChild(ring);
  let mx=0, my=0, rx=0, ry=0;
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
  (function anim(){
    requestAnimationFrame(anim);
    dot.style.left  = mx + 'px'; dot.style.top  = my + 'px';
    rx += (mx - rx) * 0.1;
    ry += (my - ry) * 0.1;
    ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
  })();
  document.addEventListener('mouseover', e => {
    const el = e.target.closest('button, a, input, [onclick], .tab, .btn-get, .product-card, .vc, .quick-btn, .btn-recargar, .variant-option, .qb');
    if (el) {
      ring.style.width  = '52px';
      ring.style.height = '52px';
      ring.style.borderColor = 'rgba(255,107,26,1)';
    } else {
      ring.style.width  = '38px';
      ring.style.height = '38px';
      ring.style.borderColor = 'rgba(255,107,26,0.8)';
    }
  });
})();
</script>

<!-- MODAL CERRAR SESIÓN -->
<div id="logout-modal" style="
  display:none;position:fixed;inset:0;z-index:99999;
  background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);
  align-items:center;justify-content:center;padding:20px;
">
  <div style="
    background:#111;border:1px solid rgba(255,107,26,0.25);border-radius:14px;
    padding:40px 36px;max-width:420px;width:100%;position:relative;
    box-shadow:0 0 60px rgba(255,107,26,0.08);
    animation:popInL .4s cubic-bezier(.34,1.56,.64,1) forwards;
  ">
    <div style="text-align:center;margin-bottom:20px;font-size:2.8rem;">⚠️</div>
    <h3 style="font-family:'Orbitron',sans-serif;font-size:.9rem;font-weight:900;
      letter-spacing:2px;color:#FF6B1A;text-align:center;margin-bottom:14px;text-transform:uppercase;">
      ¿Cerrar Sesión?
    </h3>
    <p style="font-family:'Exo 2',sans-serif;color:#888;font-size:.88rem;line-height:1.75;
      text-align:center;margin-bottom:10px;">
      Recuerda que tu <strong style="color:#fff;">saldo y compras</strong> están guardados en tu cuenta.
    </p>
    <p style="font-family:'Exo 2',sans-serif;color:#ff9955;font-size:.82rem;line-height:1.7;
      text-align:center;margin-bottom:28px;
      background:rgba(255,107,26,0.07);border:1px solid rgba(255,107,26,0.2);
      border-radius:8px;padding:12px 16px;">
      🔑 Si no recuerdas tu contraseña, <strong>no podrás recuperar el acceso</strong> a tu saldo ni a tus claves de productos. Asegúrate de tenerla guardada antes de salir.
    </p>
    <div style="display:flex;gap:12px;">
      <button onclick="document.getElementById('logout-modal').style.display='none'"
        style="flex:1;background:transparent;color:#777;border:1px solid rgba(255,255,255,.12);
        padding:13px;border-radius:6px;font-family:'Orbitron',sans-serif;font-size:.6rem;
        letter-spacing:2px;text-transform:uppercase;transition:all .2s;"
        onmouseover="this.style.borderColor='#FF6B1A';this.style.color='#FF6B1A'"
        onmouseout="this.style.borderColor='rgba(255,255,255,.12)';this.style.color='#777'">
        CANCELAR
      </button>
      <button onclick="confirmarLogout()"
        style="flex:1;background:#FF6B1A;color:#000;border:none;padding:13px;border-radius:6px;
        font-family:'Orbitron',sans-serif;font-weight:700;font-size:.6rem;
        letter-spacing:2px;text-transform:uppercase;transition:all .2s;"
        onmouseover="this.style.background='#FF8C42'" onmouseout="this.style.background='#FF6B1A'">
        SÍ, CERRAR SESIÓN
      </button>
    </div>
  </div>
</div>
<style>
@keyframes popInL{from{opacity:0;transform:scale(.85) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}
</style>

</body>
</html>
