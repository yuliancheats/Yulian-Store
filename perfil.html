<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YULIAN STORE — Mi Perfil</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --o:#FF6B1A;--ob:#FF8C42;--od:#cc5200;
      --dark:#080808;--d2:#0e0e0e;--card:#111;--c2:#161616;--c3:#1c1c1c;
      --t:#fff;--tm:#777;--border:rgba(255,107,26,.15);
      --neon:0 0 8px #FF6B1A,0 0 20px #FF6B1A,0 0 40px rgba(255,107,26,.4);
      --green:#4dff91;--green-glow:0 0 8px rgba(77,255,145,.6);
      --fd:'Orbitron',sans-serif;--fb:'Exo 2',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{background:var(--dark);color:var(--t);font-family:var(--fb);min-height:100vh;overflow-x:hidden}
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--d2)}
    ::-webkit-scrollbar-thumb{background:var(--od);border-radius:3px}
    *{cursor:none!important}
    #cdot{position:fixed;top:0;left:0;width:10px;height:10px;background:#111;border-radius:50%;
      pointer-events:none;z-index:999999;transform:translate(-50%,-50%);
      box-shadow:0 0 0 2.5px rgba(255,107,26,.95),0 0 14px rgba(255,107,26,.5);}
    #cring{position:fixed;top:0;left:0;width:38px;height:38px;
      border:2.5px solid rgba(255,107,26,.8);border-radius:50%;pointer-events:none;z-index:999998;
      transform:translate(-50%,-50%);box-shadow:0 0 14px rgba(255,107,26,.3);
      transition:width .18s,height .18s,border-color .18s;}

    /* NAV */
    nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;
      padding:14px 48px;background:rgba(8,8,8,.97);border-bottom:1px solid var(--border);backdrop-filter:blur(12px)}
    .logo{font-family:var(--fd);font-size:1.1rem;font-weight:900;letter-spacing:3px;text-decoration:none;color:var(--t);text-shadow:var(--neon)}
    .logo span{color:var(--o)}
    .nav-r{display:flex;align-items:center;gap:12px}
    .nbtn{background:transparent;color:var(--o);border:1.5px solid var(--o);padding:7px 16px;border-radius:3px;
      font-family:var(--fd);font-size:.58rem;letter-spacing:2px;text-decoration:none;
      display:inline-block;text-transform:uppercase;transition:all .2s}
    .nbtn:hover{background:var(--o);color:#000}
    .nbtn-g{border-color:rgba(255,255,255,.12);color:var(--tm)}
    .nbtn-g:hover{border-color:var(--o);color:var(--o);background:transparent}

    /* LAYOUT */
    main{max-width:1100px;margin:0 auto;padding:48px 24px}

    /* HEADER PERFIL */
    .profile-header{
      background:var(--card);border:1px solid var(--border);border-radius:12px;
      padding:36px 40px;margin-bottom:28px;
      display:flex;align-items:center;gap:32px;flex-wrap:wrap;
      position:relative;overflow:hidden;
    }
    .profile-header::before{
      content:'';position:absolute;top:0;left:0;right:0;height:2px;
      background:linear-gradient(90deg,transparent,var(--o),transparent);
    }
    .avatar{
      width:80px;height:80px;border-radius:50%;
      background:linear-gradient(135deg,var(--o),var(--od));
      display:flex;align-items:center;justify-content:center;
      font-family:var(--fd);font-size:1.8rem;font-weight:900;color:#000;
      flex-shrink:0;box-shadow:0 0 20px rgba(255,107,26,.4);
    }
    .profile-info{flex:1}
    .profile-name{font-family:var(--fd);font-size:1.3rem;font-weight:900;letter-spacing:2px;color:#fff;margin-bottom:6px}
    .profile-email{font-family:var(--fb);font-size:.88rem;color:var(--tm);margin-bottom:10px}
    .profile-badge{display:inline-block;font-family:var(--fd);font-size:.5rem;letter-spacing:2px;
      padding:4px 12px;border-radius:20px;text-transform:uppercase;font-weight:700;
      background:rgba(77,255,145,.1);border:1px solid rgba(77,255,145,.3);color:var(--green)}
    .profile-stats{display:flex;gap:20px;flex-wrap:wrap;margin-left:auto}
    .pstat{text-align:center;background:var(--c2);border:1px solid rgba(255,255,255,.06);
      border-radius:8px;padding:16px 24px;min-width:100px}
    .pstat-val{font-family:var(--fd);font-size:1.4rem;font-weight:900;color:var(--o);text-shadow:var(--neon)}
    .pstat-lbl{font-family:var(--fb);font-size:.72rem;color:var(--tm);margin-top:4px;text-transform:uppercase;letter-spacing:1px}
    .pstat.green .pstat-val{color:var(--green);text-shadow:var(--green-glow)}

    /* SALDO BOX */
    .saldo-box{
      background:linear-gradient(135deg,rgba(77,255,145,.05),rgba(77,255,145,.02));
      border:1px solid rgba(77,255,145,.2);border-radius:10px;
      padding:24px 28px;margin-bottom:28px;
      display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;
    }
    .saldo-left{}
    .saldo-label{font-family:var(--fd);font-size:.6rem;letter-spacing:3px;color:var(--tm);text-transform:uppercase;margin-bottom:6px}
    .saldo-amount{font-family:var(--fd);font-size:2.4rem;font-weight:900;color:var(--green);text-shadow:var(--green-glow)}
    .saldo-info{font-family:var(--fb);font-size:.82rem;color:var(--tm);margin-top:6px}
    .saldo-right{}
    .btn-recargar-info{
      background:transparent;border:1.5px solid rgba(77,255,145,.4);color:var(--green);
      font-family:var(--fd);font-size:.58rem;letter-spacing:2px;padding:11px 20px;
      border-radius:6px;text-transform:uppercase;transition:all .25s;
    }
    .btn-recargar-info:hover{background:rgba(77,255,145,.1);border-color:var(--green)}

    /* SECTION TITLES */
    .sec-title{
      font-family:var(--fd);font-size:.72rem;letter-spacing:3px;color:var(--o);
      text-transform:uppercase;text-shadow:0 0 6px rgba(255,107,26,.4);
      margin-bottom:18px;display:flex;align-items:center;gap:10px;
    }
    .sec-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}

    /* COMPRAS GRID */
    .compras-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:40px}
    .compra-card{
      background:var(--c2);border:1px solid rgba(255,255,255,.06);border-radius:10px;
      padding:20px 22px;transition:border-color .25s,box-shadow .25s;position:relative;overflow:hidden;
    }
    .compra-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;
      background:linear-gradient(90deg,transparent,var(--o),transparent);opacity:0;transition:opacity .3s}
    .compra-card:hover{border-color:rgba(255,107,26,.25);box-shadow:0 4px 24px rgba(255,107,26,.05)}
    .compra-card:hover::before{opacity:1}
    .compra-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
    .compra-producto{font-family:var(--fd);font-size:.68rem;font-weight:700;letter-spacing:1.5px;color:#fff;text-transform:uppercase}
    .compra-plan-badge{font-family:var(--fd);font-size:.48rem;letter-spacing:1.5px;
      padding:3px 10px;border-radius:20px;text-transform:uppercase;font-weight:700;
      background:rgba(255,107,26,.12);border:1px solid rgba(255,107,26,.3);color:var(--o)}
    .compra-key-label{font-family:var(--fd);font-size:.52rem;letter-spacing:2px;color:var(--tm);
      text-transform:uppercase;margin-bottom:6px}
    .compra-key{
      font-family:var(--fd);font-size:.65rem;color:var(--green);letter-spacing:1.5px;
      background:rgba(77,255,145,.06);border:1px solid rgba(77,255,145,.15);
      border-radius:5px;padding:8px 12px;word-break:break-all;line-height:1.5;
      display:flex;align-items:center;justify-content:space-between;gap:8px;
    }
    .copy-btn{background:none;border:none;color:var(--tm);font-size:.9rem;flex-shrink:0;
      transition:color .2s;padding:2px 4px}
    .copy-btn:hover{color:var(--green)}
    .compra-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:12px;flex-wrap:wrap;gap:6px}
    .compra-precio{font-family:var(--fd);font-size:.75rem;color:var(--o);font-weight:700}
    .compra-fecha{font-family:var(--fb);font-size:.75rem;color:var(--tm)}

    /* EMPTY STATE */
    .empty-state{text-align:center;padding:60px 20px;color:var(--tm)}
    .empty-icon{font-size:3rem;margin-bottom:16px;opacity:.4}
    .empty-state p{font-family:var(--fb);font-size:.9rem;line-height:1.7}
    .empty-state a{color:var(--o);text-decoration:none}
    .empty-state a:hover{text-decoration:underline}

    /* LOADING */
    .loading{text-align:center;padding:48px;color:var(--tm);font-family:var(--fb)}
    .spin{display:inline-block;width:24px;height:24px;border:2px solid rgba(255,107,26,.2);
      border-top-color:var(--o);border-radius:50%;animation:sp .7s linear infinite;margin-bottom:12px}
    @keyframes sp{to{transform:rotate(360deg)}}

    /* TOAST */
    .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);
      background:rgba(77,255,145,.12);border:1px solid rgba(77,255,145,.3);color:var(--green);
      font-family:var(--fd);font-size:.6rem;letter-spacing:2px;padding:12px 24px;border-radius:30px;
      z-index:99999;transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s;opacity:0;
      text-transform:uppercase}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1}

    /* FOOTER */
    footer{background:var(--d2);border-top:1px solid var(--border);padding:24px 48px;
      display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-top:60px}
    .flogo{font-family:var(--fd);font-size:.9rem;font-weight:900;letter-spacing:3px}
    .flogo span{color:var(--o)}
    footer p{font-family:var(--fb);color:var(--tm);font-size:.78rem}

    @media(max-width:768px){
      nav{padding:12px 18px}
      main{padding:28px 16px}
      .profile-header{padding:24px 20px;flex-direction:column;text-align:center}
      .profile-stats{margin-left:0;justify-content:center}
      .saldo-box{flex-direction:column;text-align:center}
      footer{padding:20px 18px;flex-direction:column;text-align:center}
    }
  </style>
</head>
<body>

<div id="toast" class="toast">✓ Clave copiada</div>

<nav>
  <a href="index.html" class="logo"><span>YULIAN</span> STORE</a>
  <div class="nav-r">
    <a href="index.html" class="nbtn nbtn-g" style="font-size:.54rem;">← Tienda</a>
    <button class="nbtn" onclick="doLogout()" style="font-size:.56rem;">CERRAR SESIÓN</button>
  </div>
</nav>

<main>

  <!-- LOADING -->
  <div id="loading" class="loading">
    <div class="spin"></div><br>Cargando tu perfil...
  </div>

  <!-- CONTENIDO (oculto hasta cargar) -->
  <div id="perfil-content" style="display:none">

    <!-- HEADER -->
    <div class="profile-header">
      <div class="avatar" id="avatar-letra">Y</div>
      <div class="profile-info">
        <div class="profile-name" id="p-name">—</div>
        <div class="profile-email" id="p-email">—</div>
        <span class="profile-badge">✓ Usuario Activo</span>
      </div>
      <div class="profile-stats">
        <div class="pstat">
          <div class="pstat-val" id="p-compras">0</div>
          <div class="pstat-lbl">Compras</div>
        </div>
        <div class="pstat green">
          <div class="pstat-val" id="p-saldo">$0.00</div>
          <div class="pstat-lbl">Saldo</div>
        </div>
      </div>
    </div>

    <!-- SALDO BOX -->
    <div class="saldo-box">
      <div class="saldo-left">
        <div class="saldo-label">Saldo disponible</div>
        <div class="saldo-amount" id="saldo-big">$0.00</div>
        <div class="saldo-info">Para recargar saldo contacta al administrador por Discord.</div>
      </div>
      <div class="saldo-right">
        <button class="btn-recargar-info" onclick="window.open('https://discord.gg/TU_LINK_AQUI','_blank')">
          💬 CONTACTAR PARA RECARGAR
        </button>
      </div>
    </div>

    <!-- COMPRAS -->
    <div class="sec-title">🎮 Mis Compras</div>
    <div id="compras-container">
      <div class="loading">
        <div class="spin"></div><br>Cargando compras...
      </div>
    </div>

  </div>
</main>

<footer>
  <div class="flogo"><span>YULIAN</span> STORE</div>
  <p>© 2025 Yulian Store. Todos los derechos reservados.</p>
  <a href="index.html" style="color:var(--o);font-family:'Orbitron',sans-serif;font-size:.6rem;letter-spacing:1.5px;text-decoration:none;">← Volver</a>
</footer>

<script type="module">
  import { initializeApp }                          from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc,
           collection, query, where,
           getDocs, orderBy }                        from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const cfg = {
    apiKey:"AIzaSyB-HNqDxY2uRRS922yGkrtJDKuh0iwbbn0",
    authDomain:"yulian-store.firebaseapp.com",
    projectId:"yulian-store",
    storageBucket:"yulian-store.firebasestorage.app",
    messagingSenderId:"372613089099",
    appId:"1:372613089099:web:b70fae80818c73628f8ace"
  };
  const app  = initializeApp(cfg);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = 'login.html';
      return;
    }

    // Fill profile info
    const nombre = user.displayName || user.email.split('@')[0];
    document.getElementById('p-name').textContent  = nombre.toUpperCase();
    document.getElementById('p-email').textContent = user.email;
    document.getElementById('avatar-letra').textContent = nombre.charAt(0).toUpperCase();

    // Load Firestore data
    try {
      const snap = await getDoc(doc(db, 'users', user.uid));
      if (snap.exists()) {
        const data = snap.data();
        const saldo = data.saldo ?? 0;
        const purchases = data.purchases ?? [];

        document.getElementById('p-saldo').textContent   = `$${saldo.toFixed(2)}`;
        document.getElementById('saldo-big').textContent = `$${saldo.toFixed(2)}`;
        document.getElementById('p-compras').textContent = purchases.length;
      }
    } catch(e) { console.warn(e); }

    // Load compras from /compras collection
    await loadCompras(user.uid);

    // Show content
    document.getElementById('loading').style.display         = 'none';
    document.getElementById('perfil-content').style.display  = 'block';
  });

  async function loadCompras(uid) {
    const cont = document.getElementById('compras-container');
    try {
      const q = query(
        collection(db, 'compras'),
        where('uid', '==', uid),
        orderBy('fecha', 'desc')
      );
      const snap = await getDocs(q);

      if (snap.empty) {
        cont.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🎮</div>
            <p>Aún no tienes compras.<br>
            <a href="index.html">Visita la tienda</a> para obtener acceso a nuestros productos.</p>
          </div>`;
        return;
      }

      const grid = document.createElement('div');
      grid.className = 'compras-grid';

      snap.forEach(ds => {
        const c = ds.data();
        const fecha = c.fecha?.toDate
          ? c.fecha.toDate().toLocaleDateString('es-ES', {day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})
          : '—';

        const card = document.createElement('div');
        card.className = 'compra-card';
        card.innerHTML = `
          <div class="compra-top">
            <div class="compra-producto">${c.producto || '—'}</div>
            <span class="compra-plan-badge">${c.plan || '—'}</span>
          </div>
          <div class="compra-key-label">Clave de acceso</div>
          <div class="compra-key">
            <span id="key-${ds.id}">${c.clave || '—'}</span>
            <button class="copy-btn" onclick="copiarClave('${ds.id}','${c.clave}')" title="Copiar clave">📋</button>
          </div>
          <div class="compra-bottom">
            <span class="compra-precio">$${(c.precio || 0).toFixed(2)}</span>
            <span class="compra-fecha">${fecha}</span>
          </div>`;
        grid.appendChild(card);
      });

      cont.innerHTML = '';
      cont.appendChild(grid);

    } catch(e) {
      cont.innerHTML = `<p style="color:#ff6666;font-family:'Exo 2',sans-serif;padding:20px;">
        Error al cargar compras. Verifica las reglas de Firestore.</p>`;
      console.error(e);
    }
  }

  window.copiarClave = function(id, clave) {
    navigator.clipboard.writeText(clave).then(() => {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2200);
    });
  };

  window.doLogout = async function() {
    await signOut(auth);
    window.location.href = 'index.html';
  };
</script>

<script>
/* CURSOR */
(function(){
  const dot=document.createElement('div');dot.id='cdot';
  const ring=document.createElement('div');ring.id='cring';
  document.body.appendChild(dot);document.body.appendChild(ring);
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
  (function a(){requestAnimationFrame(a);
    dot.style.left=mx+'px';dot.style.top=my+'px';
    rx+=(mx-rx)*.1;ry+=(my-ry)*.1;
    ring.style.left=rx+'px';ring.style.top=ry+'px';
  })();
  document.addEventListener('mouseover',e=>{
    if(e.target.closest('button,a,.compra-card,.nbtn')){
      ring.style.width='52px';ring.style.height='52px';ring.style.borderColor='rgba(255,107,26,1)';
    } else {
      ring.style.width='38px';ring.style.height='38px';ring.style.borderColor='rgba(255,107,26,.8)';
    }
  });
})();
</script>
</body>
</html>
